name: Check Parking Availability

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 UTC = 8:00 lub 9:00 PL (zima/lato)
  workflow_dispatch:        # można też odpalić ręcznie z GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run parking check
        env:
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python3 check_parking.py

      - name: Commit updated state & page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json index.html
          git diff --staged --quiet || git commit -m "chore: update parking state $(date -u +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # po commicie z poprzedniego joba

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
